name: Build KIBA-Setup.exe

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compile KIBA-Setup.exe
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\KIBA.iss"
          if (-not (Test-Path "installer\dist\KIBA-Setup.exe")) { throw "KIBA-Setup.exe was not produced" }
          Get-Item "installer\dist\KIBA-Setup.exe" | Format-List Name, Length

      - name: Code-sign KIBA-Setup.exe (only when a cert secret is configured)
        if: ${{ secrets.WINDOWS_CERT_BASE64 != '' }}
        shell: pwsh
        env:
          CERT_B64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          CERT_PW: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP "kiba.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:CERT_B64))
          $st = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue |
                Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $st) { throw "signtool not found on the runner" }
          & $st.FullName sign /f $pfx /p $env:CERT_PW /fd SHA256 /tr http://timestamp.sectigo.com /td SHA256 "installer\dist\KIBA-Setup.exe"
          & $st.FullName verify /pa "installer\dist\KIBA-Setup.exe"
          Remove-Item $pfx -Force
          Write-Host "Signed KIBA-Setup.exe"

      - name: Upload as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: KIBA-Setup
          path: installer/dist/KIBA-Setup.exe

      - name: Publish to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: KIBA ${{ github.ref_name }}
          files: installer/dist/KIBA-Setup.exe
          body: |
            🐺 **KIBA-Setup.exe** — the single-download Windows installer.

            Download `KIBA-Setup.exe` below, double-click, follow the wizard. It installs
            Python, the dependencies, and the `kiba` command, and adds a Desktop + Start Menu
            shortcut. (Needs internet on first run to fetch the Python toolchain.)
